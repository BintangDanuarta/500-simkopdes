<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="60" />
    <title>404: Waduh, Halamannya Tidak Ketemu</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f8f9fa;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
      }

      .logo {
        width: 260px;
        margin-bottom: 12px;
      }

      .cta-button {
        background-color: #065366;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        text-decoration: none;
        margin-top: 24px;
      }

      .cta-button:hover {
        background-color: #043c4d;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 8px;
        color: #065366;
      }

      p {
        font-size: 1rem;
        color: #555;
        max-width: 600px;
      }

      #gameCanvas {
        max-width: 100%;
        width: 600px;
        height: 400px;
        border-radius: 12px;
        margin-top: 24px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        touch-action: none;
      }

      .control-panel {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .control-button {
        width: 62px;
        height: 62px;
        background-color: #065366;
        border: none;
        border-radius: 14px;
        color: #f8f9fa;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
        user-select: none;
      }

      .control-button:active {
        transform: translateY(1px);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 1.5rem;
        }
        .logo {
          width: 180px;
        }
        .control-button {
          width: 54px;
          height: 54px;
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <img
      src="https://simkopdes.id/images/simkopdes-color.webp"
      alt="Logo Simkopdes"
      class="logo"
    />

    <h1>404: Waduh, Halamannya Tidak Ketemu</h1>
    <p>
      Maaf, sepertinya halaman yang dicari sedang tidak ada. Sambil menunggu,
      yuk main game ular-ularan di bawah ini! Bisa pakai tombol panah di
      komputer atau langsung pencet tombol di layar HP Anda.
    </p>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <div class="control-panel" aria-label="Kontrol Snake untuk mobile">
      <button class="control-button" data-dir="up">↑</button>
      <button class="control-button" data-dir="left">←</button>
      <button class="control-button" data-dir="down">↓</button>
      <button class="control-button" data-dir="right">→</button>
    </div>

    <a href="/" class="cta-button">Kembali ke Halaman Utama</a>

    <script>
      (function () {
        const canvas = document.querySelector("#gameCanvas");
        const context = canvas.getContext("2d");
        const controlButtons = document.querySelectorAll(".control-button");

        const cellSize = 20;
        const cols = canvas.width / cellSize;
        const rows = canvas.height / cellSize;
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let gameOver = false;
        let gameInterval;

        function init() {
          snake = [];
          for (let i = 5; i > 0; i--) {
            snake.push({ x: i, y: 10 });
          }
          direction = { x: 1, y: 0 };
          nextDirection = { x: 1, y: 0 };
          score = 0;
          gameOver = false;
          placeFood();

          if (gameInterval) {
            clearInterval(gameInterval);
          }
          gameInterval = setInterval(gameLoop, 100);
        }

        function placeFood() {
          food.x = Math.floor(Math.random() * cols);
          food.y = Math.floor(Math.random() * rows);
          if (
            snake.some(
              (segment) => segment.x === food.x && segment.y === food.y,
            )
          ) {
            placeFood();
          }
        }

        function gameLoop() {
          if (gameOver) {
            drawGameOver();
            return;
          }

          direction = nextDirection;
          const head = {
            x: snake[0].x + direction.x,
            y: snake[0].y + direction.y,
          };

          if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
            gameOver = true;
          } else if (
            snake.some(
              (segment) => segment.x === head.x && segment.y === head.y,
            )
          ) {
            gameOver = true;
          } else {
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
              score += 1;
              placeFood();
            } else {
              snake.pop();
            }
          }

          draw();
        }

        function draw() {
          context.fillStyle = "#065366";
          context.fillRect(0, 0, canvas.width, canvas.height);
          drawGrid();
          drawFood();
          drawSnake();
          drawScore();
        }

        function drawGrid() {
          context.strokeStyle = "rgba(255, 255, 255, 0.08)";
          context.lineWidth = 1;
          for (let x = 0; x <= canvas.width; x += cellSize) {
            context.beginPath();
            context.moveTo(x, 0);
            context.lineTo(x, canvas.height);
            context.stroke();
          }
          for (let y = 0; y <= canvas.height; y += cellSize) {
            context.beginPath();
            context.moveTo(0, y);
            context.lineTo(canvas.width, y);
            context.stroke();
          }
        }

        function drawSnake() {
          snake.forEach((segment, index) => {
            context.fillStyle = index === 0 ? "#ffcc00" : "#f8f9fa";
            context.fillRect(
              segment.x * cellSize + 1,
              segment.y * cellSize + 1,
              cellSize - 2,
              cellSize - 2,
            );
          });
        }

        function drawFood() {
          context.fillStyle = "#ff6b6b";
          context.fillRect(
            food.x * cellSize + 2,
            food.y * cellSize + 2,
            cellSize - 4,
            cellSize - 4,
          );
        }

        function drawScore() {
          context.fillStyle = "#f8f9fa";
          context.font = "16pt Arial";
          context.fillText(`Skor: ${score}`, 18, 28);
        }

        function drawGameOver() {
          draw();
          context.fillStyle = "rgba(0, 0, 0, 0.6)";
          context.fillRect(0, 0, canvas.width, canvas.height);
          context.fillStyle = "#f8f9fa";
          context.font = "24pt Arial";
          context.textAlign = "center";
          context.fillText(
            "Game Over",
            canvas.width / 2,
            canvas.height / 2 - 20,
          );
          context.font = "14pt Arial";
          context.fillText(
            "Ketuk untuk mulai ulang",
            canvas.width / 2,
            canvas.height / 2 + 30,
          );
          context.textAlign = "left";
        }

        function setDirection(newDirection) {
          if (
            (newDirection.x === -direction.x && newDirection.y === 0) ||
            (newDirection.y === -direction.y && newDirection.x === 0)
          ) {
            return;
          }
          nextDirection = newDirection;
        }

        window.addEventListener("keydown", (event) => {
          switch (event.key) {
            case "ArrowUp":
            case "w":
            case "W":
              setDirection({ x: 0, y: -1 });
              break;
            case "ArrowDown":
            case "s":
            case "S":
              setDirection({ x: 0, y: 1 });
              break;
            case "ArrowLeft":
            case "a":
            case "A":
              setDirection({ x: -1, y: 0 });
              break;
            case "ArrowRight":
            case "d":
            case "D":
              setDirection({ x: 1, y: 0 });
              break;
          }
        });

        controlButtons.forEach((button) => {
          const direction = button.getAttribute("data-dir");
          const map = {
            up: { x: 0, y: -1 },
            down: { x: 0, y: 1 },
            left: { x: -1, y: 0 },
            right: { x: 1, y: 0 },
          };
          const newDirection = map[direction];

          const action = () => {
            if (!gameOver) {
              setDirection(newDirection);
            }
          };

          button.addEventListener("click", action);
          button.addEventListener("touchstart", (event) => {
            event.preventDefault();
            action();
          });
        });

        canvas.addEventListener("click", () => {
          if (gameOver) {
            init();
          }
        });

        canvas.addEventListener("touchstart", (event) => {
          if (gameOver) {
            init();
          }
        });

        init();
      })();
    </script>
  </body>
</html>
